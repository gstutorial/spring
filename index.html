<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring Data Report Generator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <meta name="theme-color" content="#2563eb">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            min-height: 100vh;
            padding: 15px;
            color: white;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 700px;
            margin: auto;
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
            border-radius: 30px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.10);
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.45);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .creator-text { margin-top: 8px; font-size: 13px; color: #94a3b8; font-weight: 600; }

        .form-group { margin-bottom: 16px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 16px; }
        .form-col { flex: 1; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #cbd5e1; }

        .input-box {
            width: 100%; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 16px; border-radius: 12px; color: white; font-size: 14px; outline: none; transition: 0.3s;
        }
        .input-box:focus { border-color: #38bdf8; background: rgba(255,255,255,0.1); }
        .input-box option { background: #0f172a; color: white; }

        .btn-row { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn { border: none; border-radius: 12px; padding: 14px 30px; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-cancel { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-save { background: #e11d48; color: white; box-shadow: 0 5px 15px rgba(225, 29, 72, 0.3); }
        .btn-save:hover { background: #be123c; }

        #loader { display: none; text-align: center; margin-top: 20px; color: #38bdf8; font-weight: bold; }
        
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #111827, #1f2937); padding: 14px 20px;
            border-radius: 16px; color: white; font-weight: 700; z-index: 9999;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #resultsScreen { display: none; animation: fadeIn 0.4s; }
        
        .code-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
            border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.10);
            transition: 0.3s ease;
        }

        .all-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        .card-header-toggle { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .code-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #e11d48, #be123c);
            display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900;
        }
        .code-title { font-size: 18px; font-weight: 800; }
        .code-subtitle { font-size: 12px; color: #94a3b8; }
        
        .toggle-arrow { transition: transform 0.3s ease; }
        .rotate-arrow { transform: rotate(180deg); }

        .card-collapsible { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-bottom: 16px; }
        .summary-box { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 8px; text-align: center; }
        .summary-number { font-size: 20px; font-weight: 900; color: #38bdf8; }
        .summary-label { font-size: 11px; color: #cbd5e1; margin-top: 4px; font-weight: bold; }

        .action-btn-row { display: flex; gap: 10px; }
        .download-btn, .share-btn {
            flex: 1; border: none; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: white;
        }
        .download-btn { background: linear-gradient(135deg, #16a34a, #22c55e); }
        .share-btn { background: linear-gradient(135deg, #2563eb, #38bdf8); }

        .back-btn {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<img src="gs.png" id="pdfLogo" style="display: none;" crossorigin="anonymous" onerror="this.onerror=null; this.dataset.failed='true';">

<div id="toast"></div>

<div class="container">
    <div class="header">
        <div class="title">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Spring Report Generator
        </div>
        <div class="creator-text">App Created By Gobind Sharma</div>
    </div>

    <div id="formScreen">
        <div class="form-row">
            <div class="form-col">
                <label>Start Date <span style="color:red">*</span></label>
                <input type="date" id="startDate" class="input-box" required>
            </div>
            <div class="form-col">
                <label>End Date <span style="color:red">*</span></label>
                <input type="date" id="endDate" class="input-box" required>
            </div>
        </div>

        <div class="form-group"><label>Code</label><select id="selCode" class="input-box"><option value="">-- All --</option></select></div>
        <div class="form-group"><label>Group</label><select id="selGroup" class="input-box"><option value="">-- All --</option></select></div>
        <div class="form-group"><label>Make</label><select id="selMake" class="input-box"><option value="">-- All --</option></select></div>
        <div class="form-group"><label>User Name (Tested By)</label><select id="selUser" class="input-box"><option value="">-- All --</option></select></div>

        <div id="loader">Fetching and processing data...</div>

        <div class="btn-row">
            <button class="btn btn-cancel" onclick="resetForm()">Reset</button>
            <button class="btn btn-save" onclick="generateReport()">Generate Report</button>
        </div>
    </div>

    <div id="resultsScreen">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: #38bdf8;">Reports Generated</h2>
            <p style="color: #cbd5e1; font-size: 14px;" id="totalRecordsText">0 Total Records Found</p>
        </div>

        <div id="codeCardsContainer"></div>

        <button class="back-btn" onclick="goBack()">
            <svg width="18" height="18" style="vertical-align: middle; margin-right: 5px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path></svg>
            Back to Search
        </button>
    </div>
</div>

<script>
    const DATA_URL = 'https://docs.google.com/spreadsheets/d/1WYK6dThqgY6vU-HpKggFXN0Roz3aq3wX99BTGDEkgcQ/export?format=csv&gid=0';
    const CODE_URL = 'https://docs.google.com/spreadsheets/d/1WYK6dThqgY6vU-HpKggFXN0Roz3aq3wX99BTGDEkgcQ/export?format=csv&gid=2132794261';
    
    const COL_DATE = 1, COL_MAKE = 2, COL_MFG = 3, COL_SL = 4, COL_FREE_HT = 5, COL_HT_LOAD = 7;
    const COL_GROUP = 8, COL_CRACK = 9, COL_CAUSE = 10, COL_REMARK = 11, COL_CODE = 12, COL_USER = 18; 
    
    let globalData = [];
    let codeDetailsMap = {};
    let groupedFilteredData = {}; 

    window.onload = async () => {
        const todayStr = getLocalYMD(new Date());
        document.getElementById('startDate').value = todayStr;
        document.getElementById('endDate').value = todayStr;

        document.getElementById('loader').style.display = 'block';
        document.getElementById('loader').innerText = 'Initializing data...';
        await fetchAndPopulateData();
        document.getElementById('loader').style.display = 'none';
    };

    function getLocalYMD(d) {
        let month = '' + (d.getMonth() + 1), day = '' + d.getDate(), year = d.getFullYear();
        return [year, month.padStart(2,'0'), day.padStart(2,'0')].join('-');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function parseCSVLine(line) {
        const result = [];
        let cur = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            if (line[i] === '"') inQuotes = !inQuotes;
            else if (line[i] === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += line[i];
        }
        result.push(cur.trim());
        return result;
    }

    function parseDateStrict(dateStr) {
        if (!dateStr) return null;
        let datePart = dateStr.split(' ')[0]; 
        const parts = datePart.split(/[\/\-]/);
        if (parts.length === 3) {
            let p0 = parseInt(parts[0], 10), p1 = parseInt(parts[1], 10), p2 = parseInt(parts[2], 10);
            if (parts[2].length === 4) { return new Date(p2, p1 - 1, p0); } 
            if (parts[0].length === 4) { return new Date(p0, p1 - 1, p2); } 
        }
        const fallback = new Date(dateStr);
        return isNaN(fallback.getTime()) ? null : fallback;
    }

    async function fetchAndPopulateData() {
        try {
            const [resData, resCode] = await Promise.all([fetch(DATA_URL), fetch(CODE_URL)]);
            const csvData = await resData.text();
            const csvCode = await resCode.text();
            
            const codeLines = csvCode.split('\n').filter(l => l.trim() !== '');
            const codeHeaders = parseCSVLine(codeLines[0]).map(h => h.toLowerCase());
            
            const idxC = codeHeaders.findIndex(h => h.includes('code'));
            const idxB = codeHeaders.findIndex(h => h.includes('bogies'));
            const idxS = codeHeaders.findIndex(h => h.includes('spring'));
            const idxL = codeHeaders.findIndex(h => h.includes('load'));
            
            for (let i = 1; i < codeLines.length; i++) {
                const row = parseCSVLine(codeLines[i]);
                if (row[idxC]) {
                    codeDetailsMap[row[idxC]] = { 
                        bogie: row[idxB] || 'N/A', spring: row[idxS] || 'N/A', load: row[idxL] || 'N/A' 
                    };
                }
            }

            const lines = csvData.split('\n').filter(l => l.trim() !== '');
            const makes = new Set(), groups = new Set(), users = new Set(), codes = new Set();
            
            for (let i = 1; i < lines.length; i++) {
                const row = parseCSVLine(lines[i]);
                if (row.length < 10) continue; 
                
                const parsedDate = parseDateStrict(row[COL_DATE]);
                if (parsedDate) {
                    row.normalizedDateObj = parsedDate;
                    const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
                    row.displayDate = String(parsedDate.getDate()).padStart(2,'0') + '/' + months[parsedDate.getMonth()] + '/' + parsedDate.getFullYear();
                } else {
                    row.normalizedDateObj = new Date(0);
                    row.displayDate = row[COL_DATE] || '';
                }

                globalData.push(row);
                if (row[COL_MAKE]) makes.add(row[COL_MAKE]);
                if (row[COL_GROUP]) groups.add(row[COL_GROUP]);
                if (row[COL_USER]) users.add(row[COL_USER]);
                if (row[COL_CODE]) codes.add(row[COL_CODE]);
            }

            populateSelect('selMake', [...makes].sort());
            populateSelect('selGroup', [...groups].sort());
            populateSelect('selUser', [...users].sort());
            populateSelect('selCode', [...codes].sort());

        } catch (error) { showToast("Failed to load Google Sheet data."); }
    }

    function populateSelect(id, values) {
        const select = document.getElementById(id);
        values.forEach(val => { if(val) select.innerHTML += `<option value="${val}">${val}</option>`; });
    }

    function toggleCard(codeId) {
        const body = document.getElementById(`body-${codeId}`);
        const arrow = document.getElementById(`arrow-${codeId}`);
        const isClosed = (body.style.display === 'none' || body.style.display === '');
        
        document.querySelectorAll('.card-collapsible').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.toggle-arrow').forEach(el => el.classList.remove('rotate-arrow'));

        if (isClosed) { body.style.display = 'block'; arrow.classList.add('rotate-arrow'); }
    }

    function generateReport() {
        const startDateVal = document.getElementById('startDate').value;
        const endDateVal = document.getElementById('endDate').value;
        if (!startDateVal || !endDateVal) { showToast("Please enter Start and End Date."); return; }

        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {
            const startD = new Date(startDateVal); startD.setHours(0,0,0,0);
            const endD = new Date(endDateVal); endD.setHours(23, 59, 59);

            const sMake = document.getElementById('selMake').value;
            const sGroup = document.getElementById('selGroup').value;
            const sUser = document.getElementById('selUser').value;
            const sCode = document.getElementById('selCode').value;

            const filteredData = globalData.filter(row => {
                let match = (row.normalizedDateObj >= startD && row.normalizedDateObj <= endD);
                if (sMake && row[COL_MAKE] !== sMake) match = false;
                if (sGroup && row[COL_GROUP] !== sGroup) match = false;
                if (sUser && row[COL_USER] !== sUser) match = false;
                if (sCode && row[COL_CODE] !== sCode) match = false;
                return match;
            });

            document.getElementById('loader').style.display = 'none';
            if (filteredData.length === 0) { showToast("No records found for selected criteria."); return; }

            groupedFilteredData = {};
            filteredData.forEach(row => {
                const code = row[COL_CODE] || 'No Code';
                if (!groupedFilteredData[code]) groupedFilteredData[code] = [];
                groupedFilteredData[code].push(row);
            });

            Object.keys(groupedFilteredData).forEach(code => {
                groupedFilteredData[code].sort((a,b) => a.normalizedDateObj - b.normalizedDateObj);
            });

            document.getElementById('totalRecordsText').innerText = `${filteredData.length} Total Records Found`;
            renderCodeCards();

            document.getElementById('formScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
        }, 300);
    }

    function renderCodeCards() {
        const container = document.getElementById('codeCardsContainer');
        container.innerHTML = '';

        const allCard = document.createElement('div');
        allCard.className = 'code-card all-card';
        allCard.innerHTML = `
            <div class="card-header-toggle" onclick="toggleCard('ALL')">
                <div class="header-left">
                    <div class="code-icon" style="background: linear-gradient(135deg, #10b981, #047857);">📚</div>
                    <div><div class="code-title">ALL CODES COMBINED</div><div class="code-subtitle">Combine all sections in one PDF</div></div>
                </div>
                <div class="toggle-arrow" id="arrow-ALL">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
            </div>
            <div class="card-collapsible" id="body-ALL">
                <div class="action-btn-row">
                    <button class="download-btn" onclick="downloadPDF(null, true)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download All</button>
                    <button class="share-btn" onclick="sharePDF(null, true)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg> Share All</button>
                </div>
            </div>`;
        container.appendChild(allCard);

        Object.keys(groupedFilteredData).forEach((code, index) => {
            const dataRows = groupedFilteredData[code];
            const safeId = `code_${index}`;

            const groupCounts = {};
            dataRows.forEach(r => { const grp = (r[COL_GROUP] || 'Blank').toUpperCase(); groupCounts[grp] = (groupCounts[grp] || 0) + 1; });

            let summaryHtml = '<div class="summary-grid">';
            Object.keys(groupCounts).sort().forEach(g => {
                summaryHtml += `<div class="summary-box"><div class="summary-number">${groupCounts[g]}</div><div class="summary-label">Group ${g}</div></div>`;
            });
            summaryHtml += '</div>';

            const card = document.createElement('div');
            card.className = 'code-card';
            card.innerHTML = `
                <div class="card-header-toggle" onclick="toggleCard('${safeId}')">
                    <div class="header-left">
                        <div class="code-icon">${code.substring(0,2)}</div>
                        <div><div class="code-title">Code: ${code}</div><div class="code-subtitle">${dataRows.length} Entries</div></div>
                    </div>
                    <div class="toggle-arrow" id="arrow-${safeId}">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>
                <div class="card-collapsible" id="body-${safeId}">
                    ${summaryHtml}
                    <div class="action-btn-row">
                        <button class="download-btn" onclick="downloadPDF('${code}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download</button>
                        <button class="share-btn" onclick="sharePDF('${code}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg> Share</button>
                    </div>
                </div>`;
            container.appendChild(card);
        });
    }

    function resetForm() {
        document.getElementById('startDate').value = getLocalYMD(new Date());
        document.getElementById('endDate').value = getLocalYMD(new Date());
        ['selMake', 'selGroup', 'selUser', 'selCode'].forEach(id => document.getElementById(id).value = '');
    }

    function goBack() {
        document.getElementById('resultsScreen').style.display = 'none';
        document.getElementById('formScreen').style.display = 'block';
    }

    function drawGradient(doc, x, y, w, h, startColor, endColor) {
        for (let i = 0; i <= w; i += 0.5) {
            let ratio = i / w;
            let r = Math.round(startColor[0] + (endColor[0] - startColor[0]) * ratio);
            let g = Math.round(startColor[1] + (endColor[1] - startColor[1]) * ratio);
            let b = Math.round(startColor[2] + (endColor[2] - startColor[2]) * ratio);
            doc.setFillColor(r, g, b);
            doc.rect(x + i, y, 0.6, h, 'F');
        }
    }

    function buildCodePdfBlock(doc, code, dataToPrint, isFirstCodeObj) {
        if (!isFirstCodeObj.val) doc.addPage();
        isFirstCodeObj.val = false;

        const details = codeDetailsMap[code] || { bogie: 'N/A', spring: 'N/A', load: 'N/A' };

        let total = dataToPrint.length, pass = 0, fail = 0;
        let countA = 0, countB = 0, countC = 0;
        let failSummaryMap = {};

        dataToPrint.forEach(r => {
            const grp = (r[COL_GROUP] || '').toUpperCase();
            if (grp === 'FAIL') {
                fail++;
                // Remark is the cause of failure from sheet
                let cause = r[COL_CAUSE] || r[COL_REMARK] || '-';
                let make = r[COL_MAKE] || '-';
                let key = cause + '|' + make;
                if(!failSummaryMap[key]) failSummaryMap[key] = { cause, make, count: 0 };
                failSummaryMap[key].count++;
            } else { pass++; }
            
            if(grp === 'A') countA++;
            else if (grp === 'B') countB++;
            else if (grp === 'C') countC++;
        });

        const failSummaryArr = Object.values(failSummaryMap);

        const bodyRows = [];
        let i = 0;
        let currentGroup = -1;
        let failIdx = 0;

        // Custom Visual Merge System - Populating standard body rows
        while (i < dataToPrint.length) {
            let startRow = dataToPrint[i];
            let displayDate = startRow.displayDate;
            let span = 1;
            while (i + span < dataToPrint.length && dataToPrint[i + span].displayDate === displayDate) {
                span++;
            }
            
            currentGroup++;
            
            for (let j = 0; j < span; j++) {
                let r = dataToPrint[i + j];
                
                let cause = '', fMake = '', fTotal = '';
                if (failIdx < failSummaryArr.length) {
                    cause = failSummaryArr[failIdx].cause;
                    fMake = failSummaryArr[failIdx].make;
                    fTotal = failSummaryArr[failIdx].count.toString();
                    failIdx++;
                }

                let innerRow = [
                    displayDate, r[COL_MAKE] || '', r[COL_MFG] || '', r[COL_SL] || '', r[COL_FREE_HT] || '', 
                    r[COL_HT_LOAD] || '', r[COL_GROUP] || '', r[COL_CRACK] || '', r[COL_CAUSE] || '', 
                    r[COL_USER] || '', cause, fMake, fTotal
                ];

                bodyRows.push({
                    rawDate: displayDate,
                    row: innerRow,
                    grpIdx: currentGroup
                });
            }
            i += span;
        }

        const formatForHeader = (dateStr) => {
            const d = new Date(dateStr);
            const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
            return String(d.getDate()).padStart(2,'0') + '/' + months[d.getMonth()] + '/' + d.getFullYear();
        }
        
        const startDateStr = formatForHeader(document.getElementById('startDate').value);
        const endDateStr = formatForHeader(document.getElementById('endDate').value);
        const pw = doc.internal.pageSize.width;

        let startPage = doc.internal.getCurrentPageInfo().pageNumber;

        // AutoTable implementation
        doc.autoTable({
            startY: 50, // Starts immediately below card on page 1
            margin: { top: 25, left: 5, right: 5, bottom: 15 }, // Continued pages margin
            head: [
                [ 
                    { content: 'Daily Working Report', colSpan: 10 },
                    { content: 'Failure Report', colSpan: 3 }
                ],
                [ 'Date', 'Make', 'Mfg. Date', 'SL. No.', 'Free Height', 'Height Under Load', 'Group', 'Crack', 'Remark', 'Tested By', 'Cause of Failure', 'Make', 'Total' ]
            ],
            body: bodyRows.map(r => r.row),
            theme: 'grid',
            styles: { fontSize: 7, cellPadding: 2, lineColor: [200, 200, 200], lineWidth: 0.1, valign: 'middle', textColor: 0 },
            headStyles: { lineWidth: 0, textColor: 255, halign: 'center' },
            didParseCell: function(data) {
                if (data.section === 'body') {
                    const rowData = bodyRows[data.row.index];
                    
                    // Custom Visual Merging 
                    if (data.column.index === 0) {
                        let isFirstInGroup = data.row.index === 0 || bodyRows[data.row.index - 1].rawDate !== rowData.rawDate;
                        let isLastInGroup = data.row.index === bodyRows.length - 1 || bodyRows[data.row.index + 1].rawDate !== rowData.rawDate;
                        
                        data.cell.styles.lineWidth = {
                            top: isFirstInGroup ? 0.1 : 0,
                            bottom: isLastInGroup ? 0.1 : 0,
                            left: 0.1,
                            right: 0.1
                        };
                        data.cell.styles.halign = 'center';
                        data.cell.styles.fontStyle = 'bold';
                    }

                    // Alternate Main Table Colors
                    if (data.column.index < 10) {
                        data.cell.styles.fillColor = rowData.grpIdx % 2 === 0 ? [255, 255, 255] : [240, 248, 255]; 
                    } else {
                        // Alternate Failure Report Colors
                        data.cell.styles.fillColor = data.row.index % 2 === 0 ? [255, 255, 255] : [255, 240, 240]; 
                        if(data.column.index === 12) data.cell.styles.halign = 'center'; 
                    }
                }
            },
            willDrawCell: function(data) {
                if (data.section === 'head') {
                    if (data.row.index === 0) {
                        if (data.column.index === 0) drawGradient(doc, data.cell.x, data.cell.y, data.cell.width, data.cell.height, [15, 23, 42], [30, 58, 138]);
                        if (data.column.index === 10) drawGradient(doc, data.cell.x, data.cell.y, data.cell.width, data.cell.height, [159, 18, 57], [220, 38, 38]);
                    } else if (data.row.index === 1) {
                        if (data.column.index < 10) drawGradient(doc, data.cell.x, data.cell.y, data.cell.width, data.cell.height, [15, 23, 42], [30, 58, 138]);
                        else drawGradient(doc, data.cell.x, data.cell.y, data.cell.width, data.cell.height, [159, 18, 57], [220, 38, 38]);
                    }
                }
                
                // Clear text for duplicate date cells (unless it's the first on the page)
                if (data.section === 'body' && data.column.index === 0) {
                    let rowInfo = bodyRows[data.row.index];
                    let isFirstOnPage = data.row.index === 0 || (data.table.body[data.row.index - 1].pageNumber !== data.row.pageNumber);
                    let isFirstInGroup = data.row.index === 0 || bodyRows[data.row.index - 1].rawDate !== rowInfo.rawDate;
                    
                    if (!isFirstOnPage && !isFirstInGroup) {
                        data.cell.text = ''; 
                    }
                }
            }
        });

        let endPage = doc.internal.getCurrentPageInfo().pageNumber;

        // Render Page Layouts
        for (let p = startPage; p <= endPage; p++) {
            doc.setPage(p);
            
            // DRAW TOP HEADER (ON ALL PAGES)
            drawGradient(doc, 0, 0, pw, 22, [15, 23, 42], [30, 58, 138]);
            
            try {
                const img = document.getElementById('pdfLogo');
                if (img && !img.dataset.failed) doc.addImage(img, 'PNG', 5, 2, 18, 18);
            } catch(e) {}
            
            doc.setTextColor(255, 255, 255); 
            doc.setFontSize(16); doc.setFont('helvetica', 'bold');
            doc.text("Spring Report", pw / 2, 8, { align: 'center' });
            
            doc.setFontSize(9); doc.setFont('helvetica', 'bold');
            doc.text("SSE/BSS/NBQS", pw / 2, 13, { align: 'center' });
            
            doc.setFont('helvetica', 'normal');
            doc.text("App Created By Gobind Sharma", pw / 2, 18, { align: 'center' });

            if (p === startPage) {
                // DETAILS CARD (First Page Only, exactly matches header gradient)
                let cardY = 25; // Snug right below the header
                let cardH = 22;
                drawGradient(doc, 5, cardY, pw - 10, cardH, [15, 23, 42], [30, 58, 138]);
                
                let col1X = 15, col2X = pw/2 - 40, col3X = pw - 50;
                doc.setTextColor(255, 255, 255); doc.setFontSize(9);
                
                doc.setFont('helvetica', 'bold'); doc.text("From Date:", col1X, cardY + 6); doc.setFont('helvetica', 'normal'); doc.text(startDateStr, col1X + 22, cardY + 6);
                doc.setFont('helvetica', 'bold'); doc.text("To Date:", col1X, cardY + 12); doc.setFont('helvetica', 'normal'); doc.text(endDateStr, col1X + 22, cardY + 12);
                doc.setFont('helvetica', 'bold'); doc.text("Code:", col1X, cardY + 18); doc.setFont('helvetica', 'normal'); doc.text(code, col1X + 22, cardY + 18);
                
                doc.setFont('helvetica', 'bold'); doc.text("Type of Bogies:", col2X, cardY + 6); doc.setFont('helvetica', 'normal'); doc.text(details.bogie, col2X + 28, cardY + 6);
                doc.setFont('helvetica', 'bold'); doc.text("Type of Spring:", col2X, cardY + 12); doc.setFont('helvetica', 'normal'); doc.text(details.spring, col2X + 28, cardY + 12);
                doc.setFont('helvetica', 'bold'); doc.text("Load:", col2X, cardY + 18); doc.setFont('helvetica', 'normal'); doc.text(details.load, col2X + 28, cardY + 18);

                doc.setFont('helvetica', 'bold'); doc.text("Total:", col3X, cardY + 6); doc.setFont('helvetica', 'normal'); doc.text(total.toString(), col3X + 15, cardY + 6);
                doc.setFont('helvetica', 'bold'); doc.text("Pass:", col3X, cardY + 12); doc.setFont('helvetica', 'normal'); doc.text(pass.toString(), col3X + 15, cardY + 12);
                doc.setFont('helvetica', 'bold'); doc.text("Fail:", col3X, cardY + 18); doc.setFont('helvetica', 'normal'); doc.text(fail.toString(), col3X + 15, cardY + 18);

                // Badges
                let badgeY = cardY + 8;
                let badgeX = pw/2 + 25;
                doc.setFillColor(253, 224, 71); doc.roundedRect(badgeX, badgeY, 15, 6, 2, 2, 'F');
                doc.setTextColor(0); doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.text(`A - ${countA}`, badgeX + 7.5, badgeY + 4.2, {align: 'center'});

                doc.setFillColor(59, 130, 246); doc.roundedRect(badgeX + 20, badgeY, 15, 6, 2, 2, 'F');
                doc.setTextColor(255); doc.text(`B - ${countB}`, badgeX + 27.5, badgeY + 4.2, {align: 'center'});

                doc.setFillColor(34, 197, 94); doc.roundedRect(badgeX + 40, badgeY, 15, 6, 2, 2, 'F');
                doc.setTextColor(0); doc.text(`C - ${countC}`, badgeX + 47.5, badgeY + 4.2, {align: 'center'});
            } else {
                // Continuation text since header handles the main visual
                doc.setTextColor(255, 255, 255); doc.setFontSize(10); doc.setFont('helvetica', 'bold');
                doc.text(`Code: ${code} (Continued)`, pw - 40, 13, { align: 'center' });
            }

            // DRAW FOOTER (ON ALL PAGES)
            const ph = doc.internal.pageSize.height;
            drawGradient(doc, 0, ph - 10, pw, 10, [15, 23, 42], [30, 58, 138]);
            doc.setTextColor(255, 255, 255); doc.setFontSize(8); doc.setFont('helvetica', 'normal');
            doc.text("App Created By Gobind Sharma", 10, ph - 4);
            doc.text(`Page ${p}`, pw - 15, ph - 4);
        }
        
        doc.setPage(endPage); 
    }

    async function buildPDFBlob(targetCode, isAll = false) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape'); 
        
        let isFirstCodeObj = { val: true };

        if (isAll) {
            const codes = Object.keys(groupedFilteredData);
            for(let i = 0; i < codes.length; i++) {
                buildCodePdfBlock(doc, codes[i], groupedFilteredData[codes[i]], isFirstCodeObj);
            }
        } else {
            buildCodePdfBlock(doc, targetCode, groupedFilteredData[targetCode], isFirstCodeObj);
        }
        
        return doc.output('blob');
    }

    async function downloadPDF(code, isAll = false) {
        try {
            const blob = await buildPDFBlob(code, isAll);
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            const prefix = isAll ? 'ALL_CODES' : `Code_${code}`;
            
            const startD = new Date(document.getElementById('startDate').value);
            const endD = new Date(document.getElementById('endDate').value);
            const fName = `Report_${prefix}_${startD.getFullYear()}-${String(startD.getMonth()+1).padStart(2,'0')}-${String(startD.getDate()).padStart(2,'0')}_to_${endD.getFullYear()}-${String(endD.getMonth()+1).padStart(2,'0')}-${String(endD.getDate()).padStart(2,'0')}.pdf`;
            
            a.download = fName;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
        } catch (e) { console.error(e); showToast("Error generating PDF"); }
    }

    async function sharePDF(code, isAll = false) {
        try {
            const blob = await buildPDFBlob(code, isAll);
            const prefix = isAll ? 'ALL_CODES' : `Code_${code}`;
            const file = new File([blob], `Report_${prefix}.pdf`, { type: 'application/pdf' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) { await navigator.share({ files: [file] }); } 
            else { showToast('Sharing via browser not supported on this device.'); }
        } catch (e) { console.error(e); showToast("Error sharing PDF"); }
    }
</script>
