<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring Data Report Generator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <meta name="theme-color" content="#2563eb">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            min-height: 100vh;
            padding: 15px;
            color: white;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: auto;
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
            border-radius: 30px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.10);
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.45);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .creator-text { margin-top: 8px; font-size: 13px; color: #94a3b8; font-weight: 600; }

        /* Form Layout */
        .form-group { margin-bottom: 16px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 16px; }
        .form-col { flex: 1; }
        
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #cbd5e1; }

        .input-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        
        .input-box:focus { border-color: #38bdf8; background: rgba(255,255,255,0.1); }
        .input-box option { background: #0f172a; color: white; }

        /* Period Buttons (Hidden by default, used for quick select) */
        .period-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .period-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);
            color: #cbd5e1; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        .period-btn:hover, .period-btn.active { background: #e11d48; border-color: #be123c; color: white; }

        /* Action Buttons */
        .btn-row { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn { border: none; border-radius: 12px; padding: 14px 30px; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-cancel { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-save { background: #e11d48; color: white; box-shadow: 0 5px 15px rgba(225, 29, 72, 0.3); }
        .btn-save:hover { background: #be123c; }

        /* Loader & Toast */
        #loader { display: none; text-align: center; margin-top: 20px; color: #38bdf8; font-weight: bold; }
        
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #111827, #1f2937); padding: 14px 20px;
            border-radius: 16px; color: white; font-weight: 700; z-index: 9999;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* Results Screen */
        #resultsScreen { display: none; animation: fadeIn 0.4s; }
        
        .code-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
            border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.10);
            transition: 0.3s ease;
        }

        .card-header-toggle {
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none;
        }
        
        .header-left { display: flex; align-items: center; gap: 12px; }
        .code-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #e11d48, #be123c);
            display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900;
        }
        .code-title { font-size: 18px; font-weight: 800; }
        .code-subtitle { font-size: 12px; color: #94a3b8; }
        
        .toggle-arrow { transition: transform 0.3s ease; }
        .rotate-arrow { transform: rotate(180deg); }

        .card-collapsible {
            display: none; margin-top: 16px; padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .summary-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px; margin-bottom: 16px;
        }

        .summary-box {
            background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 8px; text-align: center;
        }
        .summary-number { font-size: 20px; font-weight: 900; color: #38bdf8; }
        .summary-label { font-size: 11px; color: #cbd5e1; margin-top: 4px; font-weight: bold; }

        .action-btn-row { display: flex; gap: 10px; }
        .download-btn, .share-btn {
            flex: 1; border: none; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: white;
        }
        .download-btn { background: linear-gradient(135deg, #16a34a, #22c55e); }
        .share-btn { background: linear-gradient(135deg, #2563eb, #38bdf8); }

        .back-btn {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <div class="header">
        <div class="title">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Search Data Form
        </div>
        <div class="creator-text">Created By Gobind Sharma</div>
    </div>

    <div id="formScreen">
        <div class="form-row">
            <div class="form-col">
                <label>Start Date <span style="color:red">*</span></label>
                <input type="date" id="startDate" class="input-box" required>
            </div>
            <div class="form-col">
                <label>End Date <span style="color:red">*</span></label>
                <input type="date" id="endDate" class="input-box" required>
            </div>
        </div>

        <div class="form-group">
            <label>Code</label>
            <select id="selCode" class="input-box"><option value="">-- All --</option></select>
        </div>

        <div class="form-group">
            <label>Group</label>
            <select id="selGroup" class="input-box"><option value="">-- All --</option></select>
        </div>

        <div class="form-group">
            <label>Make</label>
            <select id="selMake" class="input-box"><option value="">-- All --</option></select>
        </div>

        <div class="form-group">
            <label>User Name (Tested By)</label>
            <select id="selUser" class="input-box"><option value="">-- All --</option></select>
        </div>

        <div id="loader">Fetching and filtering data...</div>

        <div class="btn-row">
            <button class="btn btn-cancel" onclick="resetForm()">Reset</button>
            <button class="btn btn-save" onclick="generateReport()">Generate Report</button>
        </div>
    </div>

    <div id="resultsScreen">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: #38bdf8;">Reports Generated</h2>
            <p style="color: #cbd5e1; font-size: 14px;" id="totalRecordsText">0 Total Records Found</p>
        </div>

        <div id="codeCardsContainer"></div>

        <button class="back-btn" onclick="goBack()">
            <svg width="18" height="18" style="vertical-align: middle; margin-right: 5px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path></svg>
            Back to Search
        </button>
    </div>

</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1WYK6dThqgY6vU-HpKggFXN0Roz3aq3wX99BTGDEkgcQ/export?format=csv&gid=0';
    
    // Column Indexes
    const COL_DATE = 1;
    const COL_MAKE = 2;
    const COL_MFG = 3;
    const COL_SL = 4;
    const COL_FREE_HT = 5;
    const COL_HT_LOAD = 7;
    const COL_GROUP = 8;
    const COL_CRACK = 9;
    const COL_CAUSE = 10;
    const COL_REMARK = 11;
    const COL_CODE = 12;
    const COL_USER = 18; // ModifiedByName
    
    let globalData = [];
    let groupedFilteredData = {}; 

    window.onload = async () => {
        const todayStr = getLocalYMD(new Date());
        document.getElementById('startDate').value = todayStr;
        document.getElementById('endDate').value = todayStr;

        document.getElementById('loader').style.display = 'block';
        document.getElementById('loader').innerText = 'Initializing data...';
        await fetchAndPopulateDropdowns();
        document.getElementById('loader').style.display = 'none';
    };

    function getLocalYMD(d) {
        let month = '' + (d.getMonth() + 1), day = '' + d.getDate(), year = d.getFullYear();
        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        return [year, month, day].join('-');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function fetchAndPopulateDropdowns() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split('\n').filter(l => l.trim() !== '');
            
            const makes = new Set(), groups = new Set(), users = new Set(), codes = new Set();
            
            for (let i = 1; i < lines.length; i++) {
                const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c ? c.replace(/^"|"$/g, '').trim() : '');
                if (row.length < 10) continue; 
                
                globalData.push(row);
                
                if (row[COL_MAKE]) makes.add(row[COL_MAKE]);
                if (row[COL_GROUP]) groups.add(row[COL_GROUP]);
                if (row[COL_USER]) users.add(row[COL_USER]);
                if (row[COL_CODE]) codes.add(row[COL_CODE]);
            }

            populateSelect('selMake', [...makes].sort());
            populateSelect('selGroup', [...groups].sort());
            populateSelect('selUser', [...users].sort());
            populateSelect('selCode', [...codes].sort());

        } catch (error) {
            console.error(error);
            showToast("Failed to load Google Sheet data.");
        }
    }

    function populateSelect(id, values) {
        const select = document.getElementById(id);
        values.forEach(val => {
            if(val) select.innerHTML += `<option value="${val}">${val}</option>`;
        });
    }

    function parseDateCustom(dateStr) {
        if (!dateStr) return null;
        const parts = dateStr.split(/[\/\-]/);
        if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
        return new Date(dateStr);
    }

    function formatDisplayDate(dateStr) {
        const d = parseDateCustom(dateStr);
        if (!d || isNaN(d)) return dateStr;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return String(d.getDate()).padStart(2,'0') + '-' + months[d.getMonth()] + '-' + d.getFullYear();
    }

    function toggleCard(codeId) {
        const body = document.getElementById(`body-${codeId}`);
        const arrow = document.getElementById(`arrow-${codeId}`);
        
        const isClosed = (body.style.display === 'none' || body.style.display === '');
        
        // Close all others first
        document.querySelectorAll('.card-collapsible').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.toggle-arrow').forEach(el => el.classList.remove('rotate-arrow'));

        if (isClosed) {
            body.style.display = 'block';
            arrow.classList.add('rotate-arrow');
        }
    }

    function generateReport() {
        const startDateVal = document.getElementById('startDate').value;
        const endDateVal = document.getElementById('endDate').value;
        
        if (!startDateVal || !endDateVal) {
            showToast("Please enter Start and End Date.");
            return;
        }

        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {
            const startD = new Date(startDateVal); startD.setHours(0,0,0,0);
            const endD = new Date(endDateVal); endD.setHours(23, 59, 59);

            const sMake = document.getElementById('selMake').value;
            const sGroup = document.getElementById('selGroup').value;
            const sUser = document.getElementById('selUser').value;
            const sCode = document.getElementById('selCode').value;

            const filteredData = globalData.filter(row => {
                const rowDate = parseDateCustom(row[COL_DATE]);
                if (!rowDate) return false;
                
                let match = (rowDate >= startD && rowDate <= endD);
                if (sMake && row[COL_MAKE] !== sMake) match = false;
                if (sGroup && row[COL_GROUP] !== sGroup) match = false;
                if (sUser && row[COL_USER] !== sUser) match = false;
                if (sCode && row[COL_CODE] !== sCode) match = false;
                return match;
            });

            document.getElementById('loader').style.display = 'none';
            
            if (filteredData.length === 0) {
                showToast("No records found for selected criteria.");
                return;
            }

            // Group By Code
            groupedFilteredData = {};
            filteredData.forEach(row => {
                const code = row[COL_CODE] || 'No Code';
                if (!groupedFilteredData[code]) groupedFilteredData[code] = [];
                groupedFilteredData[code].push(row);
            });

            // Sort each group's data by Date
            Object.keys(groupedFilteredData).forEach(code => {
                groupedFilteredData[code].sort((a,b) => parseDateCustom(a[COL_DATE]) - parseDateCustom(b[COL_DATE]));
            });

            document.getElementById('totalRecordsText').innerText = `${filteredData.length} Total Records Found`;
            renderCodeCards();

            document.getElementById('formScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
        }, 300);
    }

    function renderCodeCards() {
        const container = document.getElementById('codeCardsContainer');
        container.innerHTML = '';

        Object.keys(groupedFilteredData).forEach((code, index) => {
            const dataRows = groupedFilteredData[code];
            const safeId = `code_${index}`;

            // Calculate Group Totals inside this Code
            const groupCounts = {};
            dataRows.forEach(r => {
                const grp = r[COL_GROUP] || 'Blank';
                groupCounts[grp] = (groupCounts[grp] || 0) + 1;
            });

            // Build Summary Grid HTML
            let summaryHtml = '<div class="summary-grid">';
            Object.keys(groupCounts).sort().forEach(g => {
                summaryHtml += `
                    <div class="summary-box">
                        <div class="summary-number">${groupCounts[g]}</div>
                        <div class="summary-label">Group ${g}</div>
                    </div>`;
            });
            summaryHtml += '</div>';

            const card = document.createElement('div');
            card.className = 'code-card';
            card.innerHTML = `
                <div class="card-header-toggle" onclick="toggleCard('${safeId}')">
                    <div class="header-left">
                        <div class="code-icon">${code.substring(0,2)}</div>
                        <div>
                            <div class="code-title">Code: ${code}</div>
                            <div class="code-subtitle">${dataRows.length} Entries</div>
                        </div>
                    </div>
                    <div class="toggle-arrow" id="arrow-${safeId}">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>
                <div class="card-collapsible" id="body-${safeId}">
                    ${summaryHtml}
                    <div class="action-btn-row">
                        <button class="download-btn" onclick="downloadPDF('${code}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Download
                        </button>
                        <button class="share-btn" onclick="sharePDF('${code}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                            Share
                        </button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function resetForm() {
        document.getElementById('startDate').value = getLocalYMD(new Date());
        document.getElementById('endDate').value = getLocalYMD(new Date());
        document.getElementById('selMake').value = '';
        document.getElementById('selGroup').value = '';
        document.getElementById('selUser').value = '';
        document.getElementById('selCode').value = '';
    }

    function goBack() {
        document.getElementById('resultsScreen').style.display = 'none';
        document.getElementById('formScreen').style.display = 'block';
    }

    async function buildPDFBlob(targetCode) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape'); 
        
        const dataToPrint = groupedFilteredData[targetCode];

        const dateCounts = {};
        dataToPrint.forEach(r => {
            const d = r[COL_DATE];
            dateCounts[d] = (dateCounts[d] || 0) + 1;
        });

        const bodyRows = [];
        let currentGroup = -1;
        let previousDate = '';

        dataToPrint.forEach(r => {
            let rawDate = r[COL_DATE];
            let displayDate = formatDisplayDate(rawDate);

            // Columns specified: Date, Make, Mfg. Date, SL. No., Free Height, Height Under Load, Group, Crack, Remark(Cause of Failure), Tested By, Cause of Failure, Make, Total.
            let innerRow = [
                r[COL_MAKE] || '',
                r[COL_MFG] || '',
                r[COL_SL] || '',
                r[COL_FREE_HT] || '',
                r[COL_HT_LOAD] || '',
                r[COL_GROUP] || '',
                r[COL_CRACK] || '',
                r[COL_REMARK] || '', // Using Remark
                r[COL_USER] || '',   // Tested By
                r[COL_CAUSE] || '',  // Cause of Failure
                r[COL_MAKE] || '',
                '1'
            ];

            if (rawDate !== previousDate) {
                currentGroup++;
                bodyRows.push({
                    row: [
                        { content: displayDate, rowSpan: dateCounts[rawDate], styles: { valign: 'middle', halign: 'center', fontStyle: 'bold' } },
                        ...innerRow
                    ],
                    group: currentGroup
                });
                previousDate = rawDate;
            } else {
                bodyRows.push({ row: innerRow, group: currentGroup });
            }
        });

        const tableHeaders = ['Date', 'Make', 'Mfg.\nDate', 'SL. No.', 'Free\nHeight', 'Height Under\nLoad', 'Group', 'Crack', 'Remark', 'Tested By', 'Cause of\nFailure', 'Make', 'Total'];

        doc.autoTable({
            startY: 35,
            head: [tableHeaders],
            body: bodyRows.map(r => r.row),
            theme: 'grid',
            styles: { fontSize: 7, cellPadding: 1.5, lineColor: [200, 200, 200], lineWidth: 0.1, valign: 'middle', overflow: 'linebreak' },
            headStyles: { textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center', lineWidth: 0 },
            columnStyles: {
                0: { cellWidth: 20, halign: 'center' },
                12: { halign: 'center', fontStyle: 'bold' }
            },
            didParseCell: function(data) {
                if (data.section === 'head') { 
                    data.cell.styles.fillColor = null; 
                    data.cell.styles.lineWidth = 0;
                }
                if (data.section === 'body') {
                    const rowData = bodyRows[data.row.index];
                    const bgColor = rowData.group % 2 === 0 ? [255, 255, 255] : [235, 243, 255]; 
                    data.cell.styles.fillColor = bgColor;
                }
            },
            willDrawCell: function(data) {
                if (data.section === 'head') {
                    let tableW = doc.internal.pageSize.width - 20;
                    let relativeX = data.cell.x - 10;
                    
                    for (let i = 0; i <= data.cell.width; i += 0.5) { 
                        let ratio = (relativeX + i) / tableW;
                        ratio = Math.max(0, Math.min(1, ratio));
                        let r = Math.round(30 + (37 - 30) * ratio);
                        let g = Math.round(58 + (99 - 58) * ratio);
                        let b = Math.round(138 + (235 - 138) * ratio);
                        
                        doc.setFillColor(r, g, b);
                        let rectWidth = Math.min(0.6, data.cell.width - i);
                        doc.rect(data.cell.x + i, data.cell.y, rectWidth, data.cell.height, 'F');
                    }
                }
            }
        });

        // Headers and Footers for every page
        const pageCount = doc.internal.getNumberOfPages();
        const pageHeight = doc.internal.pageSize.height;
        const pageWidth = doc.internal.pageSize.width;
        
        for(let i = 1; i <= pageCount; i++) {
            doc.setPage(i);
            
            const headerHeight = 25;
            for (let x = 0; x <= pageWidth; x += 0.5) {
                let ratio = x / pageWidth;
                let r = Math.round(15 + (30 - 15) * ratio);  
                let g = Math.round(23 + (58 - 23) * ratio);
                let b = Math.round(42 + (138 - 42) * ratio);
                doc.setFillColor(r, g, b);
                doc.rect(x, 0, 0.6, headerHeight, 'F'); 
            }

            const footerHeight = 12;
            const footerY = pageHeight - footerHeight;
            for (let x = 0; x <= pageWidth; x += 0.5) {
                let ratio = x / pageWidth;
                let r = Math.round(15 + (30 - 15) * ratio);
                let g = Math.round(23 + (58 - 23) * ratio);
                let b = Math.round(42 + (138 - 42) * ratio);
                doc.setFillColor(r, g, b);
                doc.rect(x, footerY, 0.6, footerHeight, 'F'); 
            }

            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text(`SEARCH DATA WORK REPORT (Code: ${targetCode})`, pageWidth / 2, 10, {align:'center'});

            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            const dRange = `FROM: ${formatDisplayDate(document.getElementById('startDate').value)}     TO: ${formatDisplayDate(document.getElementById('endDate').value)}`;
            doc.text(dRange, pageWidth / 2, 18, {align:'center'});

            doc.setFontSize(9);
            doc.setTextColor(230, 240, 250);
            doc.text('App Created By Gobind Sharma', 14, pageHeight - 4.5);
            doc.text(`Page ${i} of ${pageCount}`, pageWidth - 20, pageHeight - 4.5);
        }

        return doc.output('blob');
    }

    async function downloadPDF(code) {
        try {
            const blob = await buildPDFBlob(code);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Report_${code}_${document.getElementById('startDate').value}_to_${document.getElementById('endDate').value}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        } catch (e) {
            console.error(e);
            showToast("Error generating PDF");
        }
    }

    async function sharePDF(code) {
        try {
            const blob = await buildPDFBlob(code);
            const filename = `Report_${code}_${document.getElementById('startDate').value}_to_${document.getElementById('endDate').value}.pdf`;
            const file = new File([blob], filename, { type: 'application/pdf' });
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file] });
            } else {
                showToast('Sharing via browser not supported on this device.');
            }
        } catch (e) {
            console.error(e);
            showToast("Error sharing PDF");
        }
    }
</script>
