<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring Data Report Generator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <meta name="theme-color" content="#2563eb">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            min-height: 100vh;
            padding: 15px;
            color: white;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: auto;
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
            border-radius: 30px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.10);
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.45);
        }

        .logo {
            width: 90px; height: 90px; object-fit: contain; display: block; margin: 0 auto 10px auto;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 28px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .creator-text { margin-top: 5px; font-size: 13px; color: #94a3b8; font-weight: 600; }

        .input-section { display: flex; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.4s ease-in-out; }
        
        .filter-box {
            width: 100%; max-width: 500px; background: rgba(255,255,255,0.06);
            border-radius: 24px; padding: 18px; border: 1px solid rgba(255,255,255,0.08);
        }

        .form-group { margin-bottom: 16px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 16px; }
        .form-col { flex: 1; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #cbd5e1; }

        /* CUSTOM CLICK-ANYWHERE DATE PICKER */
        .date-wrapper {
            position: relative; display: flex; align-items: center; background: rgba(255, 255, 255, 0.06);
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.15); overflow: hidden; cursor: pointer; transition: 0.3s;
        }
        .date-wrapper:hover { border-color: #38bdf8; background: rgba(255, 255, 255, 0.1); }
        .date-icon {
            position: absolute; left: 14px; color: #38bdf8; display: flex; align-items: center; pointer-events: none;
        }
        .date-input {
            width: 100%; padding: 12px 16px 12px 44px; border: none; background: transparent;
            font-size: 14px; font-weight: 700; cursor: pointer; color: white; outline: none;
        }
        .date-input::-webkit-calendar-picker-indicator {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }

        .input-box {
            width: 100%; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 16px; border-radius: 12px; color: white; font-size: 14px; outline: none; transition: 0.3s; cursor: pointer;
        }
        .input-box:focus { border-color: #38bdf8; background: rgba(255,255,255,0.1); }
        .input-box option { background: #0f172a; color: white; }

        .btn-row { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px;}
        .btn { border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-cancel { flex: 0 0 35%; background: rgba(255, 255, 255, 0.08); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.15); }
        .btn-save { flex: 1; background: linear-gradient(135deg, #e11d48, #be123c); color: white; box-shadow: 0 5px 15px rgba(225, 29, 72, 0.3); }
        .btn-save:hover { background: linear-gradient(135deg, #be123c, #9f1239); }

        #loader { display: none; text-align: center; margin-top: 20px; color: #38bdf8; font-weight: bold; }
        
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #111827, #1f2937); padding: 14px 20px;
            border-radius: 16px; color: white; font-weight: 700; z-index: 9999;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #resultsScreen { display: none; width: 100%; animation: fadeIn 0.4s; }
        
        .masonry-grid { display: grid; grid-template-columns: 1fr; gap: 14px; align-items: start; }
        .masonry-col { display: flex; flex-direction: column; gap: 14px; }

        .code-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
            border-radius: 22px; padding: 14px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.10); transition: 0.3s ease;
        }
        .code-card:hover { transform: translateY(-4px); }

        .all-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.35); margin-bottom: 20px;
        }

        .card-header-toggle { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; padding: 2px 0;}
        .header-left { display: flex; align-items: center; gap: 12px; }
        .code-icon {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, #e11d48, #be123c);
            display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 900; flex-shrink: 0;
        }
        .code-title { font-size: 18px; font-weight: 800; }
        .code-subtitle { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        
        .toggle-arrow { color: #cbd5e1; transition: transform 0.3s ease; }
        .rotate-arrow { transform: rotate(180deg); }

        .card-collapsible { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; margin-bottom: 12px; }
        .summary-box { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 8px; text-align: center; }
        .summary-number { font-size: 18px; font-weight: 900; color: #38bdf8; }
        .summary-label { font-size: 10px; color: #cbd5e1; margin-top: 4px; font-weight: bold; }

        .action-btn-row { display: flex; gap: 8px; }
        .download-btn, .share-btn {
            flex: 1; border: none; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; color: white;
        }
        .download-btn { background: linear-gradient(135deg, #16a34a, #22c55e); }
        .share-btn { background: linear-gradient(135deg, #2563eb, #38bdf8); }

        .back-btn {
            width: 100%; max-width: 450px; margin: 20px auto 0; border: none; border-radius: 18px; padding: 15px;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-size: 16px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.15); }

        @media(min-width: 992px) {
            .masonry-grid { grid-template-columns: 1fr 1fr; }
            .all-card { align-self: center; width: 100%; max-width: 500px; margin: 0 auto 20px auto; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<img src="gs.png" id="pdfLogo" style="display: none;" crossorigin="anonymous" onerror="this.onerror=null; this.dataset.failed='true';">

<div id="toast"></div>

<div class="container">
    <div class="header">
        <img src="gs.png" class="logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI5MCIgaGVpZ2h0PSI5MCI+PGNpcmNsZSBjeD0iNDUiIGN5PSI0NSIgcj0iNDUiIGZpbGw9IiM0NzU1NjkiLz48L3N2Zz4='">
        <div class="title">Spring Report Generator</div>
        <div class="creator-text">App Created By 👤 Gobind Sharma</div>
    </div>

    <div id="formScreen" class="input-section">
        <div class="filter-box">
            <div class="form-row">
                <div class="form-col">
                    <label>Start Date <span style="color:red">*</span></label>
                    <div class="date-wrapper" onclick="try{document.getElementById('startDate').showPicker()}catch(e){}">
                        <div class="date-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </div>
                        <input type="date" id="startDate" class="date-input" required>
                    </div>
                </div>
                <div class="form-col">
                    <label>End Date <span style="color:red">*</span></label>
                    <div class="date-wrapper" onclick="try{document.getElementById('endDate').showPicker()}catch(e){}">
                        <div class="date-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </div>
                        <input type="date" id="endDate" class="date-input" required>
                    </div>
                </div>
            </div>

            <div class="form-group"><label>Code</label><select id="selCode" class="input-box"><option value="">-- All --</option></select></div>
            <div class="form-group"><label>Group</label><select id="selGroup" class="input-box"><option value="">-- All --</option></select></div>
            <div class="form-group"><label>Make</label><select id="selMake" class="input-box"><option value="">-- All --</option></select></div>
            <div class="form-group"><label>User Name (Tested By)</label><select id="selUser" class="input-box"><option value="">-- All --</option></select></div>

            <div id="loader">Fetching and processing data...</div>

            <div class="btn-row">
                <button class="btn btn-cancel" onclick="resetForm()">Reset</button>
                <button class="btn btn-save" onclick="generateReport()">📄 Generate</button>
            </div>
        </div>
    </div>

    <div id="resultsScreen">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: #38bdf8;">Reports Generated</h2>
            <p style="color: #cbd5e1; font-size: 14px;" id="totalRecordsText">0 Total Records Found</p>
        </div>

        <div id="codeCardsContainer"></div>

        <button class="back-btn" onclick="goBack()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Search
        </button>
    </div>
</div>

<script>
    const DATA_URL = 'https://docs.google.com/spreadsheets/d/1WYK6dThqgY6vU-HpKggFXN0Roz3aq3wX99BTGDEkgcQ/export?format=csv&gid=0';
    const CODE_URL = 'https://docs.google.com/spreadsheets/d/1WYK6dThqgY6vU-HpKggFXN0Roz3aq3wX99BTGDEkgcQ/export?format=csv&gid=2132794261';
    
    const COL_DATE = 1, COL_MAKE = 2, COL_MFG = 3, COL_SL = 4, COL_FREE_HT = 5, COL_HT_LOAD = 7;
    const COL_GROUP = 8, COL_CRACK = 9, COL_CAUSE = 10, COL_REMARK = 11, COL_CODE = 12, COL_USER = 18; 
    
    let globalData = [];
    let codeDetailsMap = {};
    let groupedFilteredData = {}; 

    window.onload = async () => {
        const todayStr = getLocalYMD(new Date());
        document.getElementById('startDate').value = todayStr;
        document.getElementById('endDate').value = todayStr;

        document.getElementById('loader').style.display = 'block';
        document.getElementById('loader').innerText = 'Initializing data...';
        await fetchAndPopulateData();
        document.getElementById('loader').style.display = 'none';
    };

    function getLocalYMD(d) {
        let month = '' + (d.getMonth() + 1), day = '' + d.getDate(), year = d.getFullYear();
        return [year, month.padStart(2,'0'), day.padStart(2,'0')].join('-');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function parseCSVLine(line) {
        const result = [];
        let cur = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            if (line[i] === '"') inQuotes = !inQuotes;
            else if (line[i] === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += line[i];
        }
        result.push(cur.trim());
        return result;
    }

    function parseDateStrict(dateStr) {
        if (!dateStr) return null;
        let datePart = dateStr.split(' ')[0]; 
        const parts = datePart.split(/[\/\-]/);
        if (parts.length === 3) {
            let p0 = parseInt(parts[0], 10), p1 = parseInt(parts[1], 10), p2 = parseInt(parts[2], 10);
            if (parts[2].length === 4) { return new Date(p2, p1 - 1, p0); } 
            if (parts[0].length === 4) { return new Date(p0, p1 - 1, p2); } 
        }
        const fallback = new Date(dateStr);
        return isNaN(fallback.getTime()) ? null : fallback;
    }

    async function fetchAndPopulateData() {
        try {
            const [resData, resCode] = await Promise.all([fetch(DATA_URL), fetch(CODE_URL)]);
            const csvData = await resData.text();
            const csvCode = await resCode.text();
            
            const codeLines = csvCode.split('\n').filter(l => l.trim() !== '');
            const codeHeaders = parseCSVLine(codeLines[0]).map(h => h.toLowerCase());
            
            const idxC = codeHeaders.findIndex(h => h.includes('code'));
            const idxB = codeHeaders.findIndex(h => h.includes('bogies'));
            const idxS = codeHeaders.findIndex(h => h.includes('spring'));
            const idxL = codeHeaders.findIndex(h => h.includes('load'));
            
            for (let i = 1; i < codeLines.length; i++) {
                const row = parseCSVLine(codeLines[i]);
                if (row[idxC]) {
                    codeDetailsMap[row[idxC]] = { bogie: row[idxB] || 'N/A', spring: row[idxS] || 'N/A', load: row[idxL] || 'N/A' };
                }
            }

            const lines = csvData.split('\n').filter(l => l.trim() !== '');
            const makes = new Set(), groups = new Set(), users = new Set(), codes = new Set();
            
            for (let i = 1; i < lines.length; i++) {
                const row = parseCSVLine(lines[i]);
                if (row.length < 10) continue; 
                
                const parsedDate = parseDateStrict(row[COL_DATE]);
                if (parsedDate) {
                    row.normalizedDateObj = parsedDate;
                    const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
                    row.displayDate = String(parsedDate.getDate()).padStart(2,'0') + '/' + months[parsedDate.getMonth()] + '/' + parsedDate.getFullYear();
                } else {
                    row.normalizedDateObj = new Date(0);
                    row.displayDate = row[COL_DATE] || '';
                }

                globalData.push(row);
                if (row[COL_MAKE]) makes.add(row[COL_MAKE]);
                if (row[COL_GROUP]) groups.add(row[COL_GROUP]);
                if (row[COL_USER]) users.add(row[COL_USER]);
                if (row[COL_CODE]) codes.add(row[COL_CODE]);
            }

            populateSelect('selMake', [...makes].sort());
            populateSelect('selGroup', [...groups].sort());
            populateSelect('selUser', [...users].sort());
            populateSelect('selCode', [...codes].sort());

        } catch (error) { showToast("Failed to load Google Sheet data."); }
    }

    function populateSelect(id, values) {
        const select = document.getElementById(id);
        values.forEach(val => { if(val) select.innerHTML += `<option value="${val}">${val}</option>`; });
    }

    function toggleCard(codeId) {
        const body = document.getElementById(`body-${codeId}`);
        const arrow = document.getElementById(`arrow-${codeId}`);
        const isClosed = (body.style.display === 'none' || body.style.display === '');
        
        document.querySelectorAll('.card-collapsible').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.toggle-arrow').forEach(el => el.classList.remove('rotate-arrow'));

        if (isClosed) { body.style.display = 'block'; arrow.classList.add('rotate-arrow'); }
    }

    function generateReport() {
        const startDateVal = document.getElementById('startDate').value;
        const endDateVal = document.getElementById('endDate').value;
        if (!startDateVal || !endDateVal) { showToast("Please enter Start and End Date."); return; }

        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {
            const startD = new Date(startDateVal); startD.setHours(0,0,0,0);
            const endD = new Date(endDateVal); endD.setHours(23, 59, 59);

            const sMake = document.getElementById('selMake').value;
            const sGroup = document.getElementById('selGroup').value;
            const sUser = document.getElementById('selUser').value;
            const sCode = document.getElementById('selCode').value;

            const filteredData = globalData.filter(row => {
                let match = (row.normalizedDateObj >= startD && row.normalizedDateObj <= endD);
                if (sMake && row[COL_MAKE] !== sMake) match = false;
                if (sGroup && row[COL_GROUP] !== sGroup) match = false;
                if (sUser && row[COL_USER] !== sUser) match = false;
                if (sCode && row[COL_CODE] !== sCode) match = false;
                return match;
            });

            document.getElementById('loader').style.display = 'none';
            if (filteredData.length === 0) { showToast("No records found for selected criteria."); return; }

            groupedFilteredData = {};
            filteredData.forEach(row => {
                const code = row[COL_CODE] || 'No Code';
                if (!groupedFilteredData[code]) groupedFilteredData[code] = [];
                groupedFilteredData[code].push(row);
            });

            Object.keys(groupedFilteredData).forEach(code => {
                groupedFilteredData[code].sort((a,b) => a.normalizedDateObj - b.normalizedDateObj);
            });

            document.getElementById('totalRecordsText').innerText = `${filteredData.length} Total Records Found`;
            renderCodeCards();

            document.getElementById('formScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
        }, 300);
    }

    function renderCodeCards() {
        const container = document.getElementById('codeCardsContainer');
        container.innerHTML = '';

        // Calculate global stats for "All Report"
        let allA = 0, allB = 0, allC = 0, allTotal = 0;
        Object.keys(groupedFilteredData).forEach(c => {
            groupedFilteredData[c].forEach(r => {
                allTotal++;
                const grp = (r[COL_GROUP] || '').toUpperCase();
                if (grp === 'A') allA++;
                if (grp === 'B') allB++;
                if (grp === 'C') allC++;
            });
        });

        const allCard = document.createElement('div');
        allCard.className = 'all-card code-card';
        allCard.innerHTML = `
            <div class="card-header-toggle" onclick="toggleCard('ALL')">
                <div class="header-left">
                    <div class="code-icon" style="background: linear-gradient(135deg, #10b981, #047857);">📚</div>
                    <div><div class="code-title">All Report</div><div class="code-subtitle">${allTotal} Total Entries Combined</div></div>
                </div>
                <div class="toggle-arrow" id="arrow-ALL">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
            </div>
            <div class="card-collapsible" id="body-ALL">
                <div class="summary-grid">
                    <div class="summary-box"><div class="summary-number">${allA}</div><div class="summary-label">Group A</div></div>
                    <div class="summary-box"><div class="summary-number">${allB}</div><div class="summary-label">Group B</div></div>
                    <div class="summary-box"><div class="summary-number">${allC}</div><div class="summary-label">Group C</div></div>
                </div>
                <div class="action-btn-row">
                    <button class="download-btn" onclick="downloadPDF(null, true)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download All</button>
                    <button class="share-btn" onclick="sharePDF(null, true)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg> Share All</button>
                </div>
            </div>`;
        container.appendChild(allCard);

        // Masonry 2-Column Grid Setup
        const masonryGrid = document.createElement('div');
        masonryGrid.className = 'masonry-grid';
        const colLeft = document.createElement('div'); colLeft.className = 'masonry-col';
        const colRight = document.createElement('div'); colRight.className = 'masonry-col';
        masonryGrid.appendChild(colLeft);
        masonryGrid.appendChild(colRight);
        container.appendChild(masonryGrid);

        Object.keys(groupedFilteredData).forEach((code, index) => {
            const dataRows = groupedFilteredData[code];
            const safeId = `code_${index}`;

            const groupCounts = {};
            dataRows.forEach(r => { const grp = (r[COL_GROUP] || 'Blank').toUpperCase(); groupCounts[grp] = (groupCounts[grp] || 0) + 1; });

            let summaryHtml = '<div class="summary-grid">';
            Object.keys(groupCounts).sort().forEach(g => {
                summaryHtml += `<div class="summary-box"><div class="summary-number">${groupCounts[g]}</div><div class="summary-label">Group ${g}</div></div>`;
            });
            summaryHtml += '</div>';

            const card = document.createElement('div');
            card.className = 'code-card';
            card.innerHTML = `
                <div class="card-header-toggle" onclick="toggleCard('${safeId}')">
                    <div class="header-left">
                        <div class="code-icon">${code.substring(0,3)}</div>
                        <div><div class="code-title">Code: ${code}</div><div class="code-subtitle">${dataRows.length} Entries</div></div>
                    </div>
                    <div class="toggle-arrow" id="arrow-${safeId}">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>
                <div class="card-collapsible" id="body-${safeId}">
                    ${summaryHtml}
                    <div class="action-btn-row">
                        <button class="download-btn" onclick="downloadPDF('${code}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download</button>
                        <button class="share-btn" onclick="sharePDF('${code}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg> Share</button>
                    </div>
                </div>`;
            
            if (index % 2 === 0) colLeft.appendChild(card);
            else colRight.appendChild(card);
        });
    }

    function resetForm() {
        document.getElementById('startDate').value = getLocalYMD(new Date());
        document.getElementById('endDate').value = getLocalYMD(new Date());
        ['selMake', 'selGroup', 'selUser', 'selCode'].forEach(id => document.getElementById(id).value = '');
    }

    function goBack() {
        document.getElementById('resultsScreen').style.display = 'none';
        document.getElementById('formScreen').style.display = 'block';
    }

    function drawGradient(doc, x, y, w, h, startColor, endColor) {
        for (let i = 0; i <= w; i += 0.5) {
            let ratio = i / w;
            let r = Math.round(startColor[0] + (endColor[0] - startColor[0]) * ratio);
            let g = Math.round(startColor[1] + (endColor[1] - startColor[1]) * ratio);
            let b = Math.round(startColor[2] + (endColor[2] - startColor[2]) * ratio);
            doc.setFillColor(r, g, b);
            doc.rect(x + i, y, 0.6, h, 'F');
        }
    }

    function buildCodePdfBlock(doc, code, dataToPrint, isFirstCodeObj) {
        if (!isFirstCodeObj.val) doc.addPage();
        isFirstCodeObj.val = false;

        const details = codeDetailsMap[code] || { bogie: 'N/A', spring: 'N/A', load: 'N/A' };

        let total = dataToPrint.length, pass = 0, fail = 0;
        let countA = 0, countB = 0, countC = 0;
        let failSummaryMap = {};

        dataToPrint.forEach(r => {
            const grp = (r[COL_GROUP] || '').toUpperCase();
            if (grp === 'FAIL') {
                fail++;
                let cause = r[COL_CAUSE] || 'Unknown'; // Ensure 'Cause of Failure' maps properly
                let make = r[COL_MAKE] || '-';
                let key = cause + '|' + make;
                if(!failSummaryMap[key]) failSummaryMap[key] = { cause, make, count: 0 };
                failSummaryMap[key].count++;
            } else { pass++; }
            
            if(grp === 'A') countA++;
            else if (grp === 'B') countB++;
            else if (grp === 'C') countC++;
        });

        const failSummaryArr = Object.values(failSummaryMap);

        const dateCounts = {};
        dataToPrint.forEach(r => {
            const d = r.displayDate;
            dateCounts[d] = (dateCounts[d] || 0) + 1;
        });

        const bodyRows = [];
        let currentGroup = -1;
        let previousDate = '';
        let failIdx = 0;

        // Native rowSpan Engine precisely copied from SMS Work Report
        dataToPrint.forEach((r, idx) => {
            let displayDate = r.displayDate;
            
            let cause = '', fMake = '', fTotal = '';
            if (failIdx < failSummaryArr.length) {
                cause = failSummaryArr[failIdx].cause;
                fMake = failSummaryArr[failIdx].make;
                fTotal = failSummaryArr[failIdx].count.toString();
                failIdx++;
            }

            // REMARK mapped to COL_CAUSE per your instruction. Failure Report mapped to COL_REMARK if needed, but 'cause' tracks COL_CAUSE here.
            let innerRow = [
                r[COL_MAKE] || '', r[COL_MFG] || '', r[COL_SL] || '', r[COL_FREE_HT] || '', 
                r[COL_HT_LOAD] || '', r[COL_GROUP] || '', r[COL_CRACK] || '', r[COL_CAUSE] || '', 
                r[COL_USER] || '', cause, fMake, fTotal
            ];

            if (displayDate !== previousDate) {
                currentGroup++;
                bodyRows.push({
                    row: [
                        { content: displayDate, rowSpan: dateCounts[displayDate], styles: { valign: 'middle', halign: 'center', fontStyle: 'bold' } }, 
                        ...innerRow
                    ],
                    group: currentGroup
                });
                previousDate = displayDate;
            } else {
                bodyRows.push({
                    row: innerRow,
                    group: currentGroup
                });
            }
        });

        const formatForHeader = (dateStr) => {
            const d = new Date(dateStr);
            const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
            return String(d.getDate()).padStart(2,'0') + '/' + months[d.getMonth()] + '/' + d.getFullYear();
        }
        
        const startDateStr = formatForHeader(document.getElementById('startDate').value);
        const endDateStr = formatForHeader(document.getElementById('endDate').value);
        const pw = doc.internal.pageSize.width;

        let startPage = doc.internal.getCurrentPageInfo().pageNumber;

        // AutoTable handles the table layout natively with flawless rowSpan merging
        doc.autoTable({
            startY: 55, // Leaves space for the rounded Details Card on Page 1
            margin: { top: 26, left: 5, right: 5, bottom: 12 }, // Continued pages leave 26px for the slim header + 8px gap
            head: [
                [ 
                    { content: 'Daily Working Report', colSpan: 10 },
                    { content: 'Failure Report', colSpan: 3 }
                ],
                [ 'Date', 'Make', 'Mfg. Date', 'SL. No.', 'Free Height', 'Height Under Load', 'Group', 'Crack', 'Remark', 'Tested By', 'Cause of Failure', 'Make', 'Total' ]
            ],
            body: bodyRows.map(r => r.row),
            theme: 'grid',
            styles: { fontSize: 7.5, cellPadding: 2, lineColor: [200, 200, 200], lineWidth: 0.1, valign: 'middle', halign: 'center', textColor: 0 },
            headStyles: { lineWidth: 0, textColor: 255, halign: 'center' },
            didParseCell: function(data) {
                if (data.section === 'body') {
                    const rowData = bodyRows[data.row.index];
                    if (data.column.index < 10) {
                        data.cell.styles.fillColor = rowData.group % 2 === 0 ? [255, 255, 255] : [235, 243, 255]; 
                    } else {
                        data.cell.styles.fillColor = data.row.index % 2 === 0 ? [255, 255, 255] : [255, 240, 240]; 
                    }
                }
            },
            willDrawCell: function(data) {
                if (data.section === 'head') {
                    if (data.column.index < 10) {
                        drawGradient(doc, data.cell.x, data.cell.y, data.cell.width, data.cell.height, [15, 23, 42], [30, 58, 138]);
                    } else {
                        drawGradient(doc, data.cell.x, data.cell.y, data.cell.width, data.cell.height, [159, 18, 57], [220, 38, 38]);
                    }
                }
            }
        });

        let endPage = doc.internal.getCurrentPageInfo().pageNumber;

        // Render Page Headers and Footers
        for (let p = startPage; p <= endPage; p++) {
            doc.setPage(p);
            
            // DRAW TOP HEADER (ON ALL PAGES)
            drawGradient(doc, 0, 0, pw, 18, [15, 23, 42], [30, 58, 138]);
            
            doc.setTextColor(255); 
            doc.setFontSize(16); doc.setFont('helvetica', 'bold');
            doc.text("Spring Report", pw / 2, 8, { align: 'center' });
            
            doc.setFontSize(9); doc.setFont('helvetica', 'bold');
            doc.text("SSE/BSS/NBQS", pw / 2, 13, { align: 'center' });
            
            // Fixed GS Icon (optional, per your prompt)
            try {
                const img = document.getElementById('pdfLogo');
                if (img && !img.dataset.failed) doc.addImage(img, 'PNG', 5, 1, 16, 16);
            } catch(e) {}

            if (p === startPage) {
                // PAGE 1 Top Right Code
                doc.setFontSize(10); doc.setFont('helvetica', 'bold');
                doc.text(`Code: ${code}`, pw - 5, 12, { align: 'right' });

                // DETAILS CARD (Page 1 Only) perfectly matched with table width (pw - 10) and rounded
                let cardY = 24; 
                let cardH = 24;
                doc.setFillColor(30, 58, 138); // Match the dark blue gradient color
                doc.roundedRect(5, cardY, pw - 10, cardH, 4, 4, 'F');
                
                let col1X = 15, col2X = pw/2 - 40, col3X = pw - 60;
                
                doc.setTextColor(255); doc.setFontSize(9);
                
                doc.setFont('helvetica', 'bold'); doc.text("From Date:", col1X, cardY + 8); doc.setFont('helvetica', 'normal'); doc.text(startDateStr, col1X + 22, cardY + 8);
                doc.setFont('helvetica', 'bold'); doc.text("To Date:", col1X, cardY + 16); doc.setFont('helvetica', 'normal'); doc.text(endDateStr, col1X + 22, cardY + 16);
                
                doc.setFont('helvetica', 'bold'); doc.text("Type of Bogies:", col2X, cardY + 8); doc.setFont('helvetica', 'normal'); doc.text(details.bogie, col2X + 28, cardY + 8);
                doc.setFont('helvetica', 'bold'); doc.text("Type of Spring:", col2X, cardY + 16); doc.setFont('helvetica', 'normal'); doc.text(details.spring, col2X + 28, cardY + 16);
                
                doc.setFont('helvetica', 'bold'); doc.text("Load:", col3X, cardY + 8); doc.setFont('helvetica', 'normal'); doc.text(details.load, col3X + 15, cardY + 8);
                doc.setFont('helvetica', 'bold'); doc.text("Total:", col3X, cardY + 16); doc.setFont('helvetica', 'normal'); doc.text(total.toString(), col3X + 15, cardY + 16);

                doc.setFont('helvetica', 'bold'); doc.text("Pass:", pw - 30, cardY + 8); doc.setFont('helvetica', 'normal'); doc.text(pass.toString(), pw - 15, cardY + 8);
                doc.setFont('helvetica', 'bold'); doc.text("Fail:", pw - 30, cardY + 16); doc.setFont('helvetica', 'normal'); doc.text(fail.toString(), pw - 15, cardY + 16);

                // Badges A, B, C
                let badgeY = cardY + 9;
                let badgeX = pw/2 + 30;
                doc.setFillColor(253, 224, 71); doc.roundedRect(badgeX, badgeY, 15, 6, 2, 2, 'F');
                doc.setTextColor(0); doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.text(`A - ${countA}`, badgeX + 7.5, badgeY + 4.2, {align: 'center'});

                doc.setFillColor(59, 130, 246); doc.roundedRect(badgeX + 18, badgeY, 15, 6, 2, 2, 'F');
                doc.setTextColor(255); doc.text(`B - ${countB}`, badgeX + 25.5, badgeY + 4.2, {align: 'center'});

                doc.setFillColor(34, 197, 94); doc.roundedRect(badgeX + 36, badgeY, 15, 6, 2, 2, 'F');
                doc.setTextColor(0); doc.text(`C - ${countC}`, badgeX + 43.5, badgeY + 4.2, {align: 'center'});

            } else {
                // CONTINUATION PAGES Top Right Code
                doc.setFontSize(10); doc.setFont('helvetica', 'bold');
                doc.text(`Code: ${code} (Continued)`, pw - 5, 12, { align: 'right' });
            }

            // COMMON FOOTER
            const ph = doc.internal.pageSize.height;
            drawGradient(doc, 0, ph - 10, pw, 10, [15, 23, 42], [30, 58, 138]);
            doc.setTextColor(255); doc.setFontSize(8); doc.setFont('helvetica', 'normal');
            doc.text("App Created By Gobind Sharma", 10, ph - 4);
            doc.text(`Page ${p}`, pw - 15, ph - 4);
        }
        
        doc.setPage(endPage); 
    }

    async function buildPDFBlob(targetCode, isAll = false) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape'); 
        
        let isFirstCodeObj = { val: true };

        if (isAll) {
            const codes = Object.keys(groupedFilteredData);
            for(let i = 0; i < codes.length; i++) {
                buildCodePdfBlock(doc, codes[i], groupedFilteredData[codes[i]], isFirstCodeObj);
            }
        } else {
            buildCodePdfBlock(doc, targetCode, groupedFilteredData[targetCode], isFirstCodeObj);
        }
        
        return doc.output('blob');
    }

    async function downloadPDF(code, isAll = false) {
        try {
            const blob = await buildPDFBlob(code, isAll);
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            const prefix = isAll ? 'ALL_CODES' : `Code_${code}`;
            
            const startD = new Date(document.getElementById('startDate').value);
            const endD = new Date(document.getElementById('endDate').value);
            const fName = `Report_${prefix}_${startD.getFullYear()}-${String(startD.getMonth()+1).padStart(2,'0')}-${String(startD.getDate()).padStart(2,'0')}_to_${endD.getFullYear()}-${String(endD.getMonth()+1).padStart(2,'0')}-${String(endD.getDate()).padStart(2,'0')}.pdf`;
            
            a.download = fName;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
        } catch (e) { console.error(e); showToast("Error generating PDF"); }
    }

    async function sharePDF(code, isAll = false) {
        try {
            const blob = await buildPDFBlob(code, isAll);
            const prefix = isAll ? 'ALL_CODES' : `Code_${code}`;
            const file = new File([blob], `Report_${prefix}.pdf`, { type: 'application/pdf' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) { await navigator.share({ files: [file] }); } 
            else { showToast('Sharing via browser not supported on this device.'); }
        } catch (e) { console.error(e); showToast("Error sharing PDF"); }
    }
</script>
