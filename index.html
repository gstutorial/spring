<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring Data Report Generator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <meta name="theme-color" content="#2563eb">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            min-height: 100vh;
            padding: 15px;
            color: white;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: auto;
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
            border-radius: 30px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.10);
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.45);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 26px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .creator-text {
            margin-top: 8px;
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
        }

        /* Form Layout */
        .form-group { margin-bottom: 16px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 16px; }
        .form-col { flex: 1; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #cbd5e1;
        }

        .input-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        
        .input-box:focus { border-color: #38bdf8; background: rgba(255,255,255,0.1); }
        .input-box option { background: #0f172a; color: white; }

        /* Period Buttons */
        .period-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .period-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .period-btn:hover, .period-btn.active {
            background: #e11d48;
            border-color: #be123c;
            color: white;
        }

        /* Action Buttons */
        .btn-row {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px 30px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-cancel { background: transparent; color: white; }
        .btn-save {
            background: #e11d48;
            color: white;
            box-shadow: 0 5px 15px rgba(225, 29, 72, 0.3);
        }
        .btn-save:hover { background: #be123c; }

        /* Loader & Toast */
        #loader { display: none; text-align: center; margin-top: 20px; color: #38bdf8; font-weight: bold; }
        
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #111827, #1f2937);
            padding: 14px 20px;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            z-index: 9999;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* Results Screen */
        #resultsScreen { display: none; text-align: center; animation: fadeIn 0.4s; }
        
        .result-card {
            background: rgba(255,255,255,0.06);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .result-count { font-size: 40px; font-weight: 900; color: #38bdf8; margin: 10px 0; }
        
        .download-btn {
            width: 100%;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <div class="header">
        <div class="title">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Search Data Form
        </div>
        <div class="creator-text">Created By Gobind Sharma</div>
    </div>

    <div id="formScreen">
        <div class="form-row">
            <div class="form-col">
                <label>Start Date <span style="color:red">*</span></label>
                <input type="date" id="startDate" class="input-box" required>
            </div>
            <div class="form-col">
                <label>End Date <span style="color:red">*</span></label>
                <input type="date" id="endDate" class="input-box" required>
            </div>
        </div>

        <label>Period</label>
        <div class="period-grid">
            <button class="period-btn" onclick="setPeriod('today', this)">Today</button>
            <button class="period-btn" onclick="setPeriod('thisMonth', this)">This Month</button>
            <button class="period-btn" onclick="setPeriod('thisYear', this)">This Year</button>
            <button class="period-btn" onclick="setPeriod('currentFY', this)">Current F.Y</button>
        </div>

        <div class="form-group">
            <label>Code</label>
            <select id="selCode" class="input-box"><option value="">-- All --</option></select>
        </div>

        <div class="form-group">
            <label>Group</label>
            <select id="selGroup" class="input-box"><option value="">-- All --</option></select>
        </div>

        <div class="form-group">
            <label>Make</label>
            <select id="selMake" class="input-box"><option value="">-- All --</option></select>
        </div>

        <div class="form-group">
            <label>User Name</label>
            <select id="selUser" class="input-box"><option value="">-- All --</option></select>
        </div>

        <div id="loader">Fetching and filtering data...</div>

        <div class="btn-row">
            <button class="btn btn-cancel" onclick="resetForm()">Cancel</button>
            <button class="btn btn-save" onclick="generateReport()">Generate</button>
        </div>
    </div>

    <div id="resultsScreen">
        <div class="result-card">
            <h3>Report Generated</h3>
            <div class="result-count" id="recordCount">0</div>
            <div style="color:#cbd5e1; font-size: 14px; margin-bottom: 20px;">Records Found</div>
            
            <button class="download-btn" onclick="downloadPDF()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download PDF
            </button>
            <button class="download-btn" style="background: linear-gradient(135deg, #2563eb, #38bdf8);" onclick="sharePDF()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                Share PDF
            </button>
        </div>
        <button class="back-btn" onclick="goBack()">Back to Search</button>
    </div>

</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1WYK6dThqgY6vU-HpKggFXN0Roz3aq3wX99BTGDEkgcQ/export?format=csv&gid=0';
    
    // Exact Column Mapping based on Data Sheet Headers
    const COL_DATE = 1;
    const COL_MAKE = 2;
    const COL_MFG = 3;
    const COL_SL = 4;
    const COL_FREE_HT = 5;
    const COL_HT_LOAD = 7;
    const COL_GROUP = 8;
    const COL_CRACK = 9;
    const COL_CAUSE = 10;
    const COL_REMARK = 11;
    const COL_CODE = 12;
    const COL_USER = 18; // ModifiedByName
    
    let globalData = [];
    let filteredData = [];

    window.onload = async () => {
        // Set date inputs to Today initially (Period buttons stay untouched)
        const todayStr = getLocalYMD(new Date());
        document.getElementById('startDate').value = todayStr;
        document.getElementById('endDate').value = todayStr;

        document.getElementById('loader').style.display = 'block';
        document.getElementById('loader').innerText = 'Initializing data...';
        await fetchAndPopulateDropdowns();
        document.getElementById('loader').style.display = 'none';
    };

    function getLocalYMD(d) {
        let month = '' + (d.getMonth() + 1), day = '' + d.getDate(), year = d.getFullYear();
        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        return [year, month, day].join('-');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function fetchAndPopulateDropdowns() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split('\n').filter(l => l.trim() !== '');
            
            const makes = new Set(), groups = new Set(), users = new Set(), codes = new Set();
            
            for (let i = 1; i < lines.length; i++) {
                const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c ? c.replace(/^"|"$/g, '').trim() : '');
                if (row.length < 10) continue; 
                
                globalData.push(row);
                
                if (row[COL_MAKE]) makes.add(row[COL_MAKE]);
                if (row[COL_GROUP]) groups.add(row[COL_GROUP]);
                if (row[COL_USER]) users.add(row[COL_USER]);
                if (row[COL_CODE]) codes.add(row[COL_CODE]);
            }

            populateSelect('selMake', [...makes].sort());
            populateSelect('selGroup', [...groups].sort());
            populateSelect('selUser', [...users].sort());
            populateSelect('selCode', [...codes].sort());

        } catch (error) {
            console.error(error);
            showToast("Failed to load Google Sheet data.");
        }
    }

    function populateSelect(id, values) {
        const select = document.getElementById(id);
        values.forEach(val => {
            if(val) select.innerHTML += `<option value="${val}">${val}</option>`;
        });
    }

    function setPeriod(type, btnElement) {
        document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');

        const today = new Date();
        let start, end;

        if (type === 'today') {
            start = end = today;
        } else if (type === 'thisMonth') {
            start = new Date(today.getFullYear(), today.getMonth(), 1);
            end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        } else if (type === 'thisYear') {
            start = new Date(today.getFullYear(), 0, 1);
            end = new Date(today.getFullYear(), 11, 31);
        } else if (type === 'currentFY') {
            const currentYear = today.getFullYear();
            const currentMonth = today.getMonth(); 
            if (currentMonth >= 3) {
                start = new Date(currentYear, 3, 1);
                end = new Date(currentYear + 1, 2, 31);
            } else {
                start = new Date(currentYear - 1, 3, 1);
                end = new Date(currentYear, 2, 31);
            }
        }

        document.getElementById('startDate').value = getLocalYMD(start);
        document.getElementById('endDate').value = getLocalYMD(end);
    }

    function parseDateCustom(dateStr) {
        if (!dateStr) return null;
        // Assume DD/MM/YYYY or DD-MM-YYYY
        const parts = dateStr.split(/[\/\-]/);
        if (parts.length === 3) {
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }
        return new Date(dateStr);
    }

    function formatDisplayDate(dateStr) {
        const d = parseDateCustom(dateStr);
        if (!d || isNaN(d)) return dateStr;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return String(d.getDate()).padStart(2,'0') + '-' + months[d.getMonth()] + '-' + d.getFullYear();
    }

    function generateReport() {
        const startDateVal = document.getElementById('startDate').value;
        const endDateVal = document.getElementById('endDate').value;
        
        if (!startDateVal || !endDateVal) {
            showToast("Please enter Start and End Date.");
            return;
        }

        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {
            const startD = new Date(startDateVal);
            startD.setHours(0,0,0,0);
            const endD = new Date(endDateVal);
            endD.setHours(23, 59, 59);

            const sMake = document.getElementById('selMake').value;
            const sGroup = document.getElementById('selGroup').value;
            const sUser = document.getElementById('selUser').value;
            const sCode = document.getElementById('selCode').value;

            filteredData = globalData.filter(row => {
                const rowDate = parseDateCustom(row[COL_DATE]);
                if (!rowDate) return false;
                
                let match = (rowDate >= startD && rowDate <= endD);
                if (sMake && row[COL_MAKE] !== sMake) match = false;
                if (sGroup && row[COL_GROUP] !== sGroup) match = false;
                if (sUser && row[COL_USER] !== sUser) match = false;
                if (sCode && row[COL_CODE] !== sCode) match = false;

                return match;
            });

            // Sort data by Date
            filteredData.sort((a,b) => parseDateCustom(a[COL_DATE]) - parseDateCustom(b[COL_DATE]));

            document.getElementById('loader').style.display = 'none';
            
            if (filteredData.length === 0) {
                showToast("No records found for selected criteria.");
            } else {
                document.getElementById('recordCount').innerText = filteredData.length;
                document.getElementById('formScreen').style.display = 'none';
                document.getElementById('resultsScreen').style.display = 'block';
            }
        }, 300);
    }

    function resetForm() {
        document.getElementById('startDate').value = getLocalYMD(new Date());
        document.getElementById('endDate').value = getLocalYMD(new Date());
        document.getElementById('selMake').value = '';
        document.getElementById('selGroup').value = '';
        document.getElementById('selUser').value = '';
        document.getElementById('selCode').value = '';
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    }

    function goBack() {
        document.getElementById('resultsScreen').style.display = 'none';
        document.getElementById('formScreen').style.display = 'block';
    }

    async function buildPDFBlob() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape'); // Landscape required for many columns
        
        // Prepare Data & RowSpan Logic
        const dateCounts = {};
        filteredData.forEach(r => {
            const d = r[COL_DATE];
            dateCounts[d] = (dateCounts[d] || 0) + 1;
        });

        const bodyRows = [];
        let currentGroup = -1;
        let previousDate = '';

        filteredData.forEach(r => {
            let rawDate = r[COL_DATE];
            let displayDate = formatDisplayDate(rawDate);

            // Structure: Date, Make, Mfg. Date, SL. No., Free Height, Height Under Load, Group, Crack, Remark, Tested By, Cause of Failure, Make, Total
            let innerRow = [
                r[COL_MAKE] || '',
                r[COL_MFG] || '',
                r[COL_SL] || '',
                r[COL_FREE_HT] || '',
                r[COL_HT_LOAD] || '',
                r[COL_GROUP] || '',
                r[COL_CRACK] || '',
                r[COL_REMARK] || '',
                r[COL_USER] || '',
                r[COL_CAUSE] || '',
                r[COL_MAKE] || '',
                '1' // Displaying 1 as quantity/total per row based on previous app design
            ];

            if (rawDate !== previousDate) {
                currentGroup++;
                bodyRows.push({
                    row: [
                        { content: displayDate, rowSpan: dateCounts[rawDate], styles: { valign: 'middle', halign: 'center', fontStyle: 'bold' } },
                        ...innerRow
                    ],
                    group: currentGroup
                });
                previousDate = rawDate;
            } else {
                bodyRows.push({ row: innerRow, group: currentGroup });
            }
        });

        const tableHeaders = ['Date', 'Make', 'Mfg.\nDate', 'SL. No.', 'Free\nHeight', 'Height Under\nLoad', 'Group', 'Crack', 'Remark', 'Tested By', 'Cause of\nFailure', 'Make', 'Total'];

        doc.autoTable({
            startY: 35,
            head: [tableHeaders],
            body: bodyRows.map(r => r.row),
            theme: 'grid',
            styles: { fontSize: 7.5, cellPadding: 2, lineColor: [200, 200, 200], lineWidth: 0.1, valign: 'middle' },
            headStyles: { textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center', lineWidth: 0 },
            columnStyles: {
                0: { cellWidth: 22, halign: 'center' },
                // Allow auto sizing for the rest to fit in landscape naturally
                12: { halign: 'center', fontStyle: 'bold' }
            },
            didParseCell: function(data) {
                if (data.section === 'head') { 
                    data.cell.styles.fillColor = null; 
                    data.cell.styles.lineWidth = 0;
                }
                if (data.section === 'body') {
                    // Alternate row colors based on DATE GROUP
                    const rowData = bodyRows[data.row.index];
                    const bgColor = rowData.group % 2 === 0 ? [255, 255, 255] : [235, 243, 255]; 
                    data.cell.styles.fillColor = bgColor;
                }
            },
            willDrawCell: function(data) {
                if (data.section === 'head') {
                    // Exact Gradient Header Code from your previous Web App
                    let tableW = 277; // Roughly A4 Landscape usable width
                    let relativeX = data.cell.x - 10; // offset margin
                    
                    for (let i = 0; i <= data.cell.width; i += 0.5) { 
                        let ratio = (relativeX + i) / tableW;
                        ratio = Math.max(0, Math.min(1, ratio));
                        
                        let r = Math.round(30 + (37 - 30) * ratio);
                        let g = Math.round(58 + (99 - 58) * ratio);
                        let b = Math.round(138 + (235 - 138) * ratio);
                        
                        doc.setFillColor(r, g, b);
                        let rectWidth = Math.min(0.6, data.cell.width - i);
                        doc.rect(data.cell.x + i, data.cell.y, rectWidth, data.cell.height, 'F');
                    }
                }
            }
        });

        // Global Header & Footer (Runs on every page)
        const pageCount = doc.internal.getNumberOfPages();
        const pageHeight = doc.internal.pageSize.height;
        const pageWidth = doc.internal.pageSize.width;
        
        for(let i = 1; i <= pageCount; i++) {
            doc.setPage(i);
            
            // Header Bar
            const headerHeight = 25;
            for (let x = 0; x <= pageWidth; x += 0.5) {
                let ratio = x / pageWidth;
                let r = Math.round(15 + (30 - 15) * ratio);  
                let g = Math.round(23 + (58 - 23) * ratio);
                let b = Math.round(42 + (138 - 42) * ratio);
                doc.setFillColor(r, g, b);
                doc.rect(x, 0, 0.6, headerHeight, 'F'); 
            }

            // Footer Bar
            const footerHeight = 12;
            const footerY = pageHeight - footerHeight;
            for (let x = 0; x <= pageWidth; x += 0.5) {
                let ratio = x / pageWidth;
                let r = Math.round(15 + (30 - 15) * ratio);
                let g = Math.round(23 + (58 - 23) * ratio);
                let b = Math.round(42 + (138 - 42) * ratio);
                doc.setFillColor(r, g, b);
                doc.rect(x, footerY, 0.6, footerHeight, 'F'); 
            }

            // Text on Header
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text('SEARCH DATA WORK REPORT', pageWidth / 2, 10, {align:'center'});

            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            const dRange = `FROM: ${formatDisplayDate(document.getElementById('startDate').value)}     TO: ${formatDisplayDate(document.getElementById('endDate').value)}`;
            doc.text(dRange, pageWidth / 2, 18, {align:'center'});

            // Text on Footer
            doc.setFontSize(9);
            doc.setTextColor(230, 240, 250);
            doc.text('App Created By Gobind Sharma', 14, pageHeight - 4.5);
            doc.text(`Page ${i} of ${pageCount}`, pageWidth - 20, pageHeight - 4.5);
        }

        return doc.output('blob');
    }

    async function downloadPDF() {
        try {
            const blob = await buildPDFBlob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Report_${document.getElementById('startDate').value}_to_${document.getElementById('endDate').value}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        } catch (e) {
            console.error(e);
            showToast("Error generating PDF");
        }
    }

    async function sharePDF() {
        try {
            const blob = await buildPDFBlob();
            const filename = `Report_${document.getElementById('startDate').value}_to_${document.getElementById('endDate').value}.pdf`;
            const file = new File([blob], filename, { type: 'application/pdf' });
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file] });
            } else {
                showToast('Sharing via browser not supported on this device.');
            }
        } catch (e) {
            console.error(e);
            showToast("Error sharing PDF");
        }
    }
</script>

</body>
</html>
